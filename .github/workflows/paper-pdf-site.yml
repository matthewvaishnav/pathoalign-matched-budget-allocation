name: Build and deploy pair-repeat PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pair-repeat-paper-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify frozen tables
        run: python scripts/verify_tables.py

      - name: Build LaTeX PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: paper
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Create PDF site files
        run: |
          mkdir -p paper_pdf_site
          cp paper/main.pdf paper_pdf_site/pathoalign-pair-repeat-allocation.pdf
          touch paper_pdf_site/.nojekyll
          cat > paper_pdf_site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./pathoalign-pair-repeat-allocation.pdf">
            <title>PathoAlign pair-repeat allocation</title>
          </head>
          <body>
            <p><a href="./pathoalign-pair-repeat-allocation.pdf">Open the PDF</a></p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: paper_pdf_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

